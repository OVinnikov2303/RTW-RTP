<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #fff;
    padding: 40px 20px;
  }
  h2 {
    text-align: center;
    font-size: 16px;
    margin-bottom: 40px;
    font-weight: bold;
  }

  /* Tree layout */
  .tree {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Root node */
  .root {
    background: #fff;
    border: 2px solid #000;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: bold;
    text-align: center;
    white-space: nowrap;
    position: relative;
  }

  /* Vertical line from root down */
  .root-line {
    width: 2px;
    height: 30px;
    background: #000;
  }

  /* Horizontal line spanning all branches */
  .h-line-wrap {
    display: flex;
    align-items: flex-start;
    position: relative;
    width: 100%;
    justify-content: center;
  }

  /* Each column */
  .branch {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0 18px;
  }

  /* Vertical line from horizontal to node */
  .v-line {
    width: 2px;
    height: 28px;
    background: #000;
  }

  .node {
    border: 1.5px solid #000;
    padding: 7px 14px;
    font-size: 12px;
    text-align: center;
    white-space: nowrap;
    background: #fff;
    min-width: 110px;
  }

  .node.root-node {
    font-weight: bold;
    min-width: 180px;
  }

  .children {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 0;
  }

  .child-v-line {
    width: 2px;
    height: 20px;
    background: #000;
  }

  .child-node {
    border: 1.5px solid #000;
    padding: 6px 12px;
    font-size: 11px;
    text-align: center;
    white-space: nowrap;
    background: #fff;
    min-width: 150px;
    margin-bottom: 0;
  }

  /* horizontal connector bar */
  .h-bar {
    height: 2px;
    background: #000;
    width: 100%;
  }

  .caption {
    text-align: center;
    margin-top: 30px;
    font-size: 13px;
    font-style: italic;
  }

  /* Custom layout with SVG */
</style>
</head>
